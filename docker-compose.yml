services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mama_uhai
    ports:
      - "5432:5432"
    volumes:
      - mama_uhai_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/mama_uhai
      JWT_SECRET: dev-secret-change-me
    ports:
      - "4000:4000"

volumes:
  mama_uhai_data:
